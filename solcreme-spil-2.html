<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smør Solcreme! ☀️ DJ Tromle</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; font-family:'Nunito',sans-serif; }

    body {
      background: linear-gradient(135deg,#ff0000,#ff6600,#ffcc00,#33cc33,#0099ff,#6633cc,#cc33cc,#ff0066);
      background-size: 300% 300%;
      animation: rainbowShift 8s ease infinite;
      display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    }
    @keyframes rainbowShift {
      0%   { background-position:0% 50%; }
      50%  { background-position:100% 50%; }
      100% { background-position:0% 50%; }
    }

    /* NAV */
    nav {
      width:100%; display:flex; align-items:center; justify-content:space-between;
      padding:0.7rem 1.5rem;
      background:rgba(0,0,0,0.25); backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,0.15);
      flex-shrink:0;
    }
    .nav-logo { font-family:'Boogaloo',cursive; font-size:1.4rem; color:#FFE135; display:flex; align-items:center; gap:0.4rem; text-decoration:none; }
    .nav-logo img { width:36px; height:36px; object-fit:contain; }
    .back-btn {
      background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.3);
      color:white; border-radius:50px; padding:0.4rem 1.2rem;
      font-family:'Boogaloo',cursive; font-size:1rem; cursor:pointer;
      text-decoration:none; transition:background 0.2s;
    }
    .back-btn:hover { background:rgba(255,255,255,0.3); }

    /* MAIN GAME AREA */
    .game-wrap {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:0.5rem; width:100%; overflow:hidden;
    }

    .title {
      font-family:'Boogaloo',cursive;
      font-size:clamp(1.6rem,5vw,2.8rem);
      color:white;
      text-shadow:0 3px 12px rgba(0,0,0,0.4);
      margin-bottom:0.4rem;
      text-align:center;
    }
    .subtitle {
      font-size:clamp(0.85rem,2.5vw,1.1rem);
      color:rgba(255,255,255,0.85);
      margin-bottom:0.6rem;
      font-weight:700;
      text-align:center;
    }

    /* PROGRESS */
    .progress-wrap {
      width:min(400px,90vw); margin-bottom:0.6rem;
      display:flex; align-items:center; gap:0.7rem;
    }
    .progress-bar-bg {
      flex:1; height:18px; background:rgba(255,255,255,0.2);
      border-radius:50px; overflow:hidden; border:2px solid rgba(255,255,255,0.3);
    }
    .progress-bar {
      height:100%; width:0%;
      background:linear-gradient(90deg,#fff176,#ffcc00,#ff8c00);
      border-radius:50px;
      transition:width 0.1s;
      box-shadow:0 0 8px rgba(255,200,0,0.6);
    }
    .progress-pct {
      font-family:'Boogaloo',cursive; font-size:1.3rem; color:white; width:3.5rem; text-align:right;
    }

    /* CANVAS CONTAINER */
    .canvas-container {
      position:relative;
      width:min(420px,92vw);
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 12px 50px rgba(0,0,0,0.4);
      cursor:crosshair;
      flex-shrink:0;
    }
    #drumImg {
      display:block; width:100%; height:auto;
      user-select:none; pointer-events:none;
      -webkit-user-drag:none;
    }
    #paintCanvas {
      position:absolute; inset:0;
      width:100%; height:100%;
      border-radius:24px;
    }

    /* COMPLETED overlay */
    .done-overlay {
      display:none;
      position:absolute; inset:0;
      background:rgba(0,0,0,0.55);
      align-items:center; justify-content:center;
      flex-direction:column; gap:0.8rem;
      border-radius:24px;
    }
    .done-overlay.show { display:flex; }
    .done-emoji { font-size:4rem; animation:popIn 0.4s ease; }
    .done-text { font-family:'Boogaloo',cursive; font-size:2rem; color:#FFE135; text-align:center; animation:popIn 0.4s ease 0.1s both; }
    .done-sub  { font-size:1rem; color:rgba(255,255,255,0.8); font-weight:700; animation:popIn 0.4s ease 0.2s both; }
    .retry-btn {
      background:linear-gradient(135deg,#FFE135,#ff8c00);
      border:none; border-radius:50px; padding:0.7rem 1.8rem;
      font-family:'Boogaloo',cursive; font-size:1.3rem; color:white;
      cursor:pointer; animation:popIn 0.4s ease 0.3s both;
      box-shadow:0 6px 20px rgba(255,200,0,0.4);
    }
    @keyframes popIn {
      from { transform:scale(0.5); opacity:0; }
      to   { transform:scale(1);   opacity:1; }
    }

    /* CONFETTI */
    .confetti-piece {
      position:fixed; pointer-events:none; z-index:999; border-radius:2px;
      animation:confettiFall var(--t) linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
      100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
    }

    .hint {
      font-size:clamp(0.8rem,2vw,0.95rem);
      color:rgba(255,255,255,0.7);
      margin-top:0.5rem;
      font-weight:700;
      text-align:center;
    }

    /* ── PERSISTENT LEADERBOARD ── */
    .leaderboard {
      width:min(420px,92vw);
      margin-top:1rem;
      background:rgba(0,0,0,0.25);
      backdrop-filter:blur(12px);
      border:2px solid rgba(255,255,255,0.15);
      border-radius:20px;
      overflow:hidden;
      flex-shrink:0;
    }
    .leaderboard-header {
      font-family:'Boogaloo',cursive;
      font-size:1.2rem;
      color:#FFE135;
      padding:0.7rem 1.2rem;
      background:rgba(255,200,0,0.1);
      border-bottom:1px solid rgba(255,255,255,0.1);
      display:flex; align-items:center; gap:0.5rem;
      letter-spacing:0.04em;
    }
    .leaderboard-empty {
      font-family:'Boogaloo',cursive;
      font-size:1rem;
      color:rgba(255,255,255,0.4);
      padding:1rem;
      text-align:center;
    }
    .lb-entry {
      display:flex; align-items:center; gap:0.8rem;
      padding:0.55rem 1.2rem;
      border-bottom:1px solid rgba(255,255,255,0.06);
      transition:background 0.2s;
    }
    .lb-entry:last-child { border-bottom:none; }
    .lb-entry:hover { background:rgba(255,255,255,0.06); }
    .lb-entry.gold   { background:rgba(255,200,0,0.08); }
    .lb-entry.silver { background:rgba(200,200,220,0.06); }
    .lb-entry.bronze { background:rgba(200,130,50,0.06); }
    .lb-rank  { font-size:1.3rem; width:1.8rem; text-align:center; flex-shrink:0; }
    .lb-name  { flex:1; font-weight:800; color:white; font-size:1rem; }
    .lb-time  { font-family:'Boogaloo',cursive; font-size:1.15rem; color:#FFE135; flex-shrink:0; }
    .lb-new   { font-family:'Boogaloo',cursive; font-size:0.75rem; color:#4ECDC4; background:rgba(78,205,196,0.15); border:1px solid rgba(78,205,196,0.3); border-radius:50px; padding:0.1rem 0.5rem; margin-left:0.3rem; }
  
    .timer-display {
      font-family:'Boogaloo',cursive;
      font-size:clamp(2rem,8vw,3.5rem);
      color:white;
      text-shadow:0 4px 16px rgba(0,0,0,0.4);
      letter-spacing:0.02em;
      margin-bottom:0.3rem;
    }
    .hiscore-list { width:100%; margin-top:0.5rem; background:rgba(255,255,255,0.08); border-radius:12px; overflow:hidden; }
    .hiscore-list h4 { font-family:'Boogaloo',cursive; font-size:0.95rem; color:#4ECDC4; padding:0.5rem 1rem; border-bottom:1px solid rgba(255,255,255,0.1); letter-spacing:0.05em; }
    .hiscore-entry { display:flex; align-items:center; gap:0.7rem; padding:0.4rem 1rem; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.9rem; }
    .hiscore-entry:last-child { border-bottom:none; }
    .hiscore-rank  { font-size:1rem; width:1.5rem; }
    .hiscore-name  { flex:1; font-weight:700; color:white; }
    .hiscore-score { font-family:'Boogaloo',cursive; font-size:1.1rem; color:#FFE135; }

  </style>
</head>

        <input id="nameInput" type="text" maxlength="14" placeholder="Dit navn..." style="width:100%;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.3);border-radius:10px;padding:0.6rem 1rem;font-family:Boogaloo,cursive;font-size:1.2rem;color:white;text-align:center;outline:none;margin:0.5rem 0;box-sizing:border-box;" />
        <button onclick="saveName()" style="width:100%;background:linear-gradient(135deg,#FFE135,#ff8c00);border:none;border-radius:50px;padding:0.6rem;font-family:Boogaloo,cursive;font-size:1.2rem;color:white;cursor:pointer;margin-bottom:0.5rem;">💾 Gem tid!</button>
      </div>
      <div class="hiscore-list" id="hiscoreList"></div>
      <button class="retry-btn" onclick="resetGame()">🔄 Prøv igen!</button>
    </div>
  </div>

  <div class="hint" id="hintText">👆 Tryk og stryg for at smøre solcreme på!</div>

  <!-- PERSISTENT LEADERBOARD -->
  <div class="leaderboard" id="leaderboard">
    <div class="leaderboard-header">⚡ Top 5 Hurtigste Tider</div>
    <div id="leaderboardBody"><div class="leaderboard-empty">Ingen tider endnu — vær den første! 🏆</div></div>
  </div>
</div>

<script>
  const canvas = document.getElementById('paintCanvas');
  const ctx = canvas.getContext('2d');
  const container = document.getElementById('canvasContainer');
  const progressBar = document.getElementById('progressBar');
  const progressPct = document.getElementById('progressPct');
  const doneOverlay = document.getElementById('doneOverlay');
  const hintText = document.getElementById('hintText');

  let isDrawing = false;
  let covered = 0;
  let totalPixels = 0;
  let done = false;
  let coveredSet = new Set();

  // Timer
  let startTime = null;
  let timerInterval = null;
  let elapsedMs = 0;
  let gameStarted = false;

  function getHiscores() {
    try { return JSON.parse(localStorage.getItem('solcreme_hiscores') || '[]'); } catch(e) { return []; }
  }
  function saveHiscore(name, ms) {
    var list = getHiscores();
    list.push({ name: name, ms: ms, time: formatTime(ms) });
    list.sort(function(a,b){ return a.ms - b.ms; }); // fastest first
    list = list.slice(0, 5);
    localStorage.setItem('solcreme_hiscores', JSON.stringify(list));
    return list;
  }
  function formatTime(ms) {
    var s = Math.floor(ms / 1000);
    var dec = Math.floor((ms % 1000) / 10);
    return s + '.' + (dec < 10 ? '0' + dec : dec) + ' sek';
  }
  function renderHiscores() {
    var list = getHiscores();
    var medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
    var goldSilverBronze = ['gold','silver','bronze','',''];

    // In-overlay list (shown after completing)
    var el = document.getElementById('hiscoreList');
    if (el) {
      if (!list.length) { el.innerHTML = ''; }
      else {
        el.innerHTML = '<h4>⚡ Hurtigste tider</h4>' +
          list.map(function(e,i){
            return '<div class="hiscore-entry">' +
              '<span class="hiscore-rank">' + medals[i] + '</span>' +
              '<span class="hiscore-name">' + e.name + '</span>' +
              '<span class="hiscore-score">' + e.time + '</span>' +
              '</div>';
          }).join('');
      }
    }

    // Persistent leaderboard below the game
    var lb = document.getElementById('leaderboardBody');
    if (lb) {
      if (!list.length) {
        lb.innerHTML = '<div class="leaderboard-empty">Ingen tider endnu — vær den første! 🏆</div>';
      } else {
        lb.innerHTML = list.map(function(e, i) {
          return '<div class="lb-entry ' + (goldSilverBronze[i] || '') + '">' +
            '<span class="lb-rank">' + medals[i] + '</span>' +
            '<span class="lb-name">' + e.name + '</span>' +
            '<span class="lb-time">' + e.time + '</span>' +
            '</div>';
        }).join('');
      }
    }
  }

  function startTimer() {
    if (gameStarted) return;
    gameStarted = true;
    startTime = Date.now();
    timerInterval = setInterval(function() {
      elapsedMs = Date.now() - startTime;
      document.getElementById('timerDisplay').textContent = formatTime(elapsedMs);
    }, 50);
  }
  function stopTimer() {
    clearInterval(timerInterval);
    elapsedMs = Date.now() - startTime;
    document.getElementById('timerDisplay').textContent = formatTime(elapsedMs);
  }

  function resizeCanvas() {
    var rect = container.getBoundingClientRect();
    canvas.width  = rect.width;
    canvas.height = rect.height;
    totalPixels = Math.floor((canvas.width * canvas.height) / 64);
    coveredSet.clear();
    covered = 0;
    done = false;
    gameStarted = false;
    doneOverlay.classList.remove('show');
    updateProgress(0);
    clearInterval(timerInterval);
    document.getElementById('timerDisplay').textContent = '0.00 sek';
  }

  function getPos(e) {
    var rect = canvas.getBoundingClientRect();
    if (e.touches) {
      return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    }
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function paint(e) {
    if (!isDrawing || done) return;
    e.preventDefault();
    startTimer();
    var pos = getPos(e);
    var radius = Math.max(canvas.width * 0.07, 28);

    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 0.55;
    var grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, radius);
    grad.addColorStop(0, 'rgba(255,255,200,0.9)');
    grad.addColorStop(0.5, 'rgba(255,255,255,0.5)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    var bx = Math.floor(pos.x / 8);
    var by = Math.floor(pos.y / 8);
    var br = Math.ceil(radius / 8);
    for (var dx = -br; dx <= br; dx++) {
      for (var dy = -br; dy <= br; dy++) {
        if (dx*dx + dy*dy <= br*br) {
          var key = (bx+dx) + ',' + (by+dy);
          if (!coveredSet.has(key)) { coveredSet.add(key); covered++; }
        }
      }
    }

    var pct = Math.min(100, Math.round((covered / totalPixels) * 100));
    updateProgress(pct);
    if (pct >= 85 && !done) { done = true; stopTimer(); setTimeout(celebrate, 200); }
  }

  function updateProgress(pct) {
    progressBar.style.width = pct + '%';
    progressPct.textContent = pct + '%';
  }

  function celebrate() {
    document.getElementById('finalTime').textContent = formatTime(elapsedMs);
    document.getElementById('nameInput').value = '';
    renderHiscores();
    doneOverlay.classList.add('show');
    hintText.textContent = '🎉 Fantastisk! Tromlen er beskyttet mod solen!';
    spawnConfetti();
    setTimeout(function(){ document.getElementById('nameInput').focus(); }, 400);
  }

  function saveName() {
    var name = document.getElementById('nameInput').value.trim() || 'Anonym';
    saveHiscore(name, elapsedMs);
    renderHiscores();
    document.getElementById('saveArea').style.display = 'none';
  }

  function resetGame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    coveredSet.clear();
    covered = 0;
    done = false;
    gameStarted = false;
    elapsedMs = 0;
    clearInterval(timerInterval);
    doneOverlay.classList.remove('show');
    updateProgress(0);
    document.getElementById('timerDisplay').textContent = '0.00 sek';
    document.getElementById('saveArea').style.display = '';
    hintText.textContent = '👆 Tryk og stryg så hurtigt du kan!';
  }

  function spawnConfetti() {
    var colors = ['#FFE135','#FF6B6B','#4ECDC4','#C77DFF','#FF8C42','#A8E6CF'];
    for (var i = 0; i < 60; i++) {
      var c = document.createElement('div');
      c.className = 'confetti-piece';
      var sz = 6 + Math.random()*10;
      c.style.cssText = 'left:'+(10+Math.random()*80)+'vw;top:0;width:'+sz+'px;height:'+sz+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';--t:'+(1+Math.random()*2)+'s;border-radius:'+(Math.random()>.5?'50%':'3px')+';animation-delay:'+(Math.random()*0.5)+'s;';
      document.body.appendChild(c);
      setTimeout(function(){ c.remove(); }, 3000);
    }
  }

  canvas.addEventListener('mousedown',  function(e){ isDrawing=true; paint(e); });
  canvas.addEventListener('mousemove',  paint);
  canvas.addEventListener('mouseup',    function(){ isDrawing=false; });
  canvas.addEventListener('mouseleave', function(){ isDrawing=false; });
  canvas.addEventListener('touchstart', function(e){ isDrawing=true; paint(e); }, {passive:false});
  canvas.addEventListener('touchmove',  paint, {passive:false});
  canvas.addEventListener('touchend',   function(){ isDrawing=false; });

  window.addEventListener('load', function(){ setTimeout(resizeCanvas, 100); });
  window.addEventListener('resize', resizeCanvas);

  document.addEventListener('DOMContentLoaded', function(){
    var inp = document.getElementById('nameInput');
    if (inp) inp.addEventListener('keydown', function(e){ if(e.key==='Enter') saveName(); });
    renderHiscores();
  });
</script>

</body>
</html>
